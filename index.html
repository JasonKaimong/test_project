<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Shooter Mobile</title>

<!-- Phaser -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
        touch-action: none;
    }

    #three-bg {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    #game-container {
        position: relative;
        z-index: 1;
    }

    /* Touch controls */
    .controls {
        position: fixed;
        bottom: 0;
        width: 100%;
        height: 30%;
        display: flex;
        justify-content: space-between;
        z-index: 2;
    }

    .left-controls, .right-controls {
        display: flex;
        align-items: center;
        padding: 10px;
    }

    .btn {
        width: 70px;
        height: 70px;
        margin: 10px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        border: 2px solid rgba(255,255,255,0.3);
        color: white;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
    }
</style>
</head>
<body>

<canvas id="three-bg"></canvas>
<div id="game-container"></div>

<!-- Touch UI -->
<div class="controls">
    <div class="left-controls">
        <div class="btn" id="left">◀</div>
        <div class="btn" id="right">▶</div>
    </div>
    <div class="right-controls">
        <div class="btn" id="fire">●</div>
    </div>
</div>

<script>
/* =========================
   THREE.JS BACKGROUND
========================= */
const canvas = document.getElementById("three-bg");
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// Starfield
const starsGeometry = new THREE.BufferGeometry();
const starCount = 1000;
const positions = [];

for (let i = 0; i < starCount; i++) {
    positions.push((Math.random() - 0.5) * 50);
    positions.push((Math.random() - 0.5) * 50);
    positions.push((Math.random() - 0.5) * 50);
}

starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
const starsMaterial = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff });
const starField = new THREE.Points(starsGeometry, starsMaterial);

scene.add(starField);

function animateBG() {
    requestAnimationFrame(animateBG);
    starField.rotation.y += 0.0005;
    renderer.render(scene, camera);
}
animateBG();

/* =========================
   PHASER GAME
========================= */
let player, bullets, enemies;
let moveLeft = false;
let moveRight = false;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    parent: "game-container",
    transparent: true,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

function preload() {
    this.load.image('player', 'https://labs.phaser.io/assets/sprites/player.png');
    this.load.image('bullet', 'https://labs.phaser.io/assets/sprites/bullet.png');
    this.load.image('enemy', 'https://labs.phaser.io/assets/sprites/ufo.png');
}

function create() {
    player = this.physics.add.sprite(config.width/2, config.height - 100, 'player');
    player.setCollideWorldBounds(true);

    bullets = this.physics.add.group();
    enemies = this.physics.add.group();

    // Spawn enemies
    this.time.addEvent({
        delay: 1000,
        callback: () => {
            let x = Phaser.Math.Between(50, config.width - 50);
            let enemy = enemies.create(x, 0, 'enemy');
            enemy.setVelocityY(100);
        },
        loop: true
    });

    // Collision
    this.physics.add.overlap(bullets, enemies, (b, e) => {
        b.destroy();
        e.destroy();
    });
}

function update() {
    if (moveLeft) player.setVelocityX(-300);
    else if (moveRight) player.setVelocityX(300);
    else player.setVelocityX(0);
}

// Fire bullet
function fireBullet(scene) {
    let bullet = bullets.create(player.x, player.y - 20, 'bullet');
    bullet.setVelocityY(-400);
}

/* =========================
   TOUCH CONTROLS
========================= */
document.getElementById("left").addEventListener("touchstart", () => moveLeft = true);
document.getElementById("left").addEventListener("touchend", () => moveLeft = false);

document.getElementById("right").addEventListener("touchstart", () => moveRight = true);
document.getElementById("right").addEventListener("touchend", () => moveRight = false);

document.getElementById("fire").addEventListener("touchstart", () => {
    const scene = game.scene.scenes[0];
    fireBullet(scene);
});

// Resize handling
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    game.scale.resize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
